server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), camera=(), microphone=(), payment=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://tile.openstreetmap.org https://*.tile.openstreetmap.org https://*.stadiamaps.com https://api.qrserver.com https://*.global.ssl.fastly.net; font-src 'self'; connect-src 'self' http://api.trampline.localhost https://api.trampline.localhost ws://api.trampline.localhost wss://api.trampline.localhost; worker-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    set $minio_upstream minio:9000;
    resolver 127.0.0.11 valid=30s ipv6=off;

    location ^~ /files/photos/ {
        rewrite ^/files/photos/(.*)$ /trampline/photos/$1 break;
        proxy_pass http://$minio_upstream;
        proxy_set_header Host $host;
        proxy_hide_header x-amz-request-id;
        proxy_hide_header x-amz-id-2;
        proxy_intercept_errors on;
        error_page 502 503 504 = @files_backend;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location ^~ /files/videos/ {
        rewrite ^/files/videos/(.*)$ /trampline/videos/$1 break;
        proxy_pass http://$minio_upstream;
        proxy_set_header Host $host;
        proxy_hide_header x-amz-request-id;
        proxy_hide_header x-amz-id-2;
        proxy_intercept_errors on;
        error_page 502 503 504 = @files_backend;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location @files_backend {
        proxy_pass http://backend:8080$request_uri;
        proxy_set_header Host $host;
    }

    location ^~ /files/ {
        proxy_pass http://backend:8080/files/;
        proxy_set_header Host $host;
    }

    location /api/hubs/ {
        proxy_pass http://backend:8080/hubs/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    location /api/ {
        proxy_pass http://backend:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/index.html /200.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 1y;

        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        try_files $uri =404;
    }

    location ~ /\. {
        deny all;
        return 404;
    }

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;
}
